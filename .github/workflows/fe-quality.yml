name: FE Quality

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/check-fe-guardrails.mjs'
      - 'scripts/fe-debt-dashboard.mjs'
      - '.github/workflows/fe-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'scripts/check-fe-guardrails.mjs'
      - 'scripts/fe-debt-dashboard.mjs'
      - '.github/workflows/fe-quality.yml'

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            echo "npm ci attempt $attempt/3"
            if npm ci --no-audit --prefer-offline; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Guardrails
        working-directory: frontend
        run: npm run check:guardrails

      - name: Debt dashboard
        working-directory: frontend
        run: npm run check:debt

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm run test
