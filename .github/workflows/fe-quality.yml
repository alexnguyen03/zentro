name: FE Quality

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/check-fe-guardrails.mjs'
      - 'scripts/fe-debt-dashboard.mjs'
      - '.github/workflows/fe-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'scripts/check-fe-guardrails.mjs'
      - 'scripts/fe-debt-dashboard.mjs'
      - '.github/workflows/fe-quality.yml'

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Guardrails
        working-directory: frontend
        run: npm run check:guardrails

      - name: Debt dashboard
        working-directory: frontend
        run: npm run check:debt

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm run test
