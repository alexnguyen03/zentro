name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: zentro.exe
            release_name: zentro-v${version}-windows-amd64.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: zentro
            release_name: zentro-v${version}-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact_name: Zentro.app
            release_name: zentro-v${version}-macos-universal.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Sync release version metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const releaseVersion = process.env.RELEASE_VERSION;
          const coreVersion = releaseVersion.split('-')[0];
          const parts = coreVersion.split('.');
          while (parts.length < 4) parts.push('0');
          const productVersion = parts.slice(0, 4).join('.');

          const writeJson = (file, mutate) => {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            mutate(data);
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          };

          writeJson('package.json', (data) => {
            data.version = releaseVersion;
          });

          writeJson('frontend/package.json', (data) => {
            data.version = releaseVersion;
          });

          writeJson('wails.json', (data) => {
            data.info = data.info || {};
            data.info.productVersion = productVersion;
          });

          console.log(`Synced package versions to ${releaseVersion} and wails productVersion to ${productVersion}`);
          NODE

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-2.11.0 # Updated to match go.mod

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          $nsisBin = "C:\Program Files (x86)\NSIS\Bin"
          if (Test-Path $nsisBin) {
            $env:PATH = "$nsisBin;$env:PATH"
            "$nsisBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $makensis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if (-not $makensis) {
            Write-Error "makensis.exe was not found after installing NSIS."
            exit 1
          }
          & $makensis.Source /VERSION

      - name: Wails Build
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          APP_VERSION="v${VERSION}"
          LDFLAGS="-s -w -X 'zentro/internal/app.Version=${APP_VERSION}'"
          EXTRA_FLAGS=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
            EXTRA_FLAGS="-nsis"
          fi
          
          # Wails build will automatically run npm install/build based on wails.json
          wails build -platform ${{ matrix.platform }} -ldflags "$LDFLAGS" -clean $EXTRA_FLAGS

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release-assets
          cd build/bin
          # Zip the app bundle (Wails uses productName from wails.json for the .app folder)
          if [ -d "Zentro.app" ]; then
            zip -r ../../release-assets/zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip Zentro.app
          elif [ -d "zentro.app" ]; then
            zip -r ../../release-assets/zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip zentro.app
          else
            echo "Expected macOS app bundle was not produced."
            ls -la
            exit 1
          fi

      - name: Rename assets (Windows/Linux)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p release-assets
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv build/bin/zentro.exe release-assets/zentro-v${VERSION}-windows-amd64.exe
            shopt -s nullglob
            installers=(build/bin/*-installer.exe build/bin/*installer*.exe build/bin/*setup*.exe)
            if [[ ${#installers[@]} -eq 0 ]]; then
              echo "Windows installer was not produced by Wails/NSIS."
              ls -la build/bin
              exit 1
            fi
            cp "${installers[0]}" "release-assets/zentro-v${VERSION}-windows-amd64-installer.exe"
          else
            mv build/bin/zentro release-assets/zentro-v${VERSION}-linux-amd64
          fi

      - name: Package Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          tar -czf release-assets/zentro-v${VERSION}-linux-amd64.tar.gz -C release-assets zentro-v${VERSION}-linux-amd64

      - name: Zip for SignPath
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $portablePath = "release-assets/zentro-v$VERSION-windows-amd64.exe"
          $installerPath = "release-assets/zentro-v$VERSION-windows-amd64-installer.exe"
          $bundleDir = "signpath-bundle"
          $bundlePath = "zentro-signing-bundle.zip"

          foreach ($path in @($portablePath, $installerPath)) {
              Write-Host "Locating Windows artifact: $path"
              if (-not (Test-Path $path)) {
                  Write-Error "Expected Windows artifact not found at $path"
                  Get-ChildItem release-assets
                  exit 1
              }
          }

          Remove-Item $bundleDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          Copy-Item $portablePath "$bundleDir\zentro.exe" -Force
          Copy-Item $installerPath "$bundleDir\zentro-installer.exe" -Force

          Write-Host "Creating $bundlePath..."
          Compress-Archive -Path "$bundleDir\*" -DestinationPath $bundlePath -Force

          $zipFile = Get-Item $bundlePath
          Write-Host "Zip created. Size: $($zipFile.Length) bytes"
          if ($zipFile.Length -lt 100) {
              Write-Error "Created zip file is suspiciously small or empty."
              exit 1
          }

      - name: Upload unsigned artifact to GitHub
        if: matrix.os == 'windows-latest'
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifact
          path: zentro-signing-bundle.zip
          retention-days: 1

      - name: Submit and download signing request (REST API)
        if: matrix.os == 'windows-latest'
        id: sign_request
        shell: pwsh
        env:
          API_TOKEN: ${{ secrets.SIGNPATH_ORG_TOKEN }}
          ORG_ID: "d111c10f-ab29-4683-81c9-037cd5311726"
        run: |
          $headers = @{ "Authorization" = "Bearer $env:API_TOKEN" }
          
          Write-Host "Submitting signing request..."
          $uri = "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/SubmitWithArtifact"
          $form = @{
              projectSlug = "Zentro"
              signingPolicySlug = "github-ci"
              artifactConfigurationSlug = "initial"
              artifact = Get-Item "zentro-signing-bundle.zip"
          }
          Write-Host "Artifact to upload: $($form.artifact.FullName) ($($form.artifact.Length) bytes)"
          
          # 1. Submit
          $responseHeaders = $null
          try {
              $response = Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Form $form -ResponseHeadersVariable responseHeaders
              $requestId = $response.id
              
              # Nếu body không có ID, lấy từ header Location
              if (-not $requestId -and $responseHeaders.Location) {
                  $requestId = ($responseHeaders.Location -split '/')[-1]
              }
          } catch {
              Write-Host "Submission failed!"
              if ($_.Exception.Response) {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorBody = $reader.ReadToEnd()
                  Write-Host "Error Body: $errorBody"
              }
              Write-Error $_
              exit 1
          }
          
          if (-not $requestId) {
              Write-Error "Could not retrieve Signing Request ID."
              exit 1
          }
          Write-Host "Request submitted successfully. ID: $requestId"
          
          # 2. Poll for completion
          $status = "InProgress"
          while ($status -eq "InProgress" -or $status -eq "Queued" -or $status -eq "Submitted") {
              Start-Sleep -Seconds 20
              $statusResponse = Invoke-RestMethod -Uri "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId" -Method Get -Headers $headers
              $status = $statusResponse.status
              Write-Host "Current status: $status"
          }
          
          if ($status -ne "Completed") {
              Write-Error "Signing failed with status: $status"
              exit 1
          }
          
          # 3. Download (Using curl.exe for better binary handling)
          Write-Host "Signing completed. Downloading signed artifact..."
          New-Item -ItemType Directory -Force -Path signed-artifact
          
          # Use curl.exe instead of Invoke-WebRequest to ensure binary integrity
          curl.exe -H "Authorization: Bearer $env:API_TOKEN" `
              -L -o "signed-artifact/signed.zip" `
              "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId/SignedArtifact"
          
          # 4. Extract and Hash
          Expand-Archive -Path "signed-artifact/signed.zip" -DestinationPath "signed-artifact" -Force
          foreach ($signedFile in @("signed-artifact/zentro.exe", "signed-artifact/zentro-installer.exe")) {
              if (Test-Path $signedFile) {
                  $hash = (Get-FileHash -Path $signedFile -Algorithm SHA256).Hash
                  Write-Host "SIGNED FILE SHA256 [$signedFile]: $hash"
              }
          }
          Write-Host "Artifact downloaded and integrity hash printed."

      - name: Verify and Extract signed artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $targets = @(
              @{
                  SignedPath = "signed-artifact/zentro.exe"
                  ReleasePath = "release-assets/zentro-v$VERSION-windows-amd64.exe"
                  Label = "portable exe"
              },
              @{
                  SignedPath = "signed-artifact/zentro-installer.exe"
                  ReleasePath = "release-assets/zentro-v$VERSION-windows-amd64-installer.exe"
                  Label = "installer exe"
              }
          )

          foreach ($target in $targets) {
              Write-Host "Checking original signature for $($target.Label)..."
              (Get-AuthenticodeSignature $target.ReleasePath).Status

              if (-not (Test-Path $target.SignedPath)) {
                  Write-Error "Signed $($target.Label) not found at $($target.SignedPath)"
                  Get-ChildItem signed-artifact -Recurse
                  exit 1
              }

              $signedSize = (Get-Item $target.SignedPath).Length
              Write-Host "Signed $($target.Label) found. Size: $signedSize bytes"

              Copy-Item $target.SignedPath $target.ReleasePath -Force
              Write-Host "Overwrote release asset for $($target.Label) with signed version."

              Write-Host "Verifying final signature for $($target.Label)..."
              $sig = Get-AuthenticodeSignature $target.ReleasePath
              Write-Host "Signature Status: $($sig.Status)"
              Write-Host "Subject: $($sig.SignerCertificate.Subject)"

              if ($sig.Status -eq "NotSigned") {
                  Write-Error "CRITICAL: Final $($target.Label) is NOT SIGNED!"
                  exit 1
              }

              if ($sig.Status -ne "Valid") {
                  Write-Warning "Signature status for $($target.Label) is $($sig.Status). This is common for test certificates that are not in the trusted root store of the runner."
              }
          }

          Write-Host "Digital signatures applied successfully to both Windows artifacts."

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
