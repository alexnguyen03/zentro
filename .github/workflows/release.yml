name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: zentro.exe
            release_name: zentro-v${version}-windows-amd64.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: zentro
            release_name: zentro-v${version}-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact_name: Zentro.app
            release_name: zentro-v${version}-macos-universal.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-2.11.0 # Updated to match go.mod

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Wails Build
        shell: bash
        run: |
          # Set ldflags based on platform
          LDFLAGS="-s -w"
          EXTRA_FLAGS=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
            EXTRA_FLAGS="-nsis"
          fi
          
          # Wails build will automatically run npm install/build based on wails.json
          wails build -platform ${{ matrix.platform }} -ldflags "$LDFLAGS" -clean $EXTRA_FLAGS

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          # Zip the app bundle (Wails uses productName from wails.json for the .app folder)
          if [ -d "Zentro.app" ]; then
            zip -r ../../zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip Zentro.app
          elif [ -d "zentro.app" ]; then
            zip -r ../../zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip zentro.app
          fi

      - name: Rename assets (Windows/Linux)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv build/bin/zentro.exe zentro-v${VERSION}-windows-amd64.exe
            # Optional NSIS output, name can vary by Wails/NSIS templates
            if compgen -G "build/bin/*setup*.exe" > /dev/null; then
              cp "$(ls build/bin/*setup*.exe | head -n 1)" "zentro-v${VERSION}-windows-amd64-setup.exe"
            fi
          else
            mv build/bin/zentro zentro-v${VERSION}-linux-amd64
          fi

      - name: Package Linux
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          tar -czf zentro-v${VERSION}-linux-amd64.tar.gz zentro-v${VERSION}-linux-amd64

      - name: Zip for SignPath
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $EXE_PATH = "zentro-v$VERSION-windows-amd64.exe"
          
          Write-Host "Locating executable: $EXE_PATH"
          if (Test-Path $EXE_PATH) {
              Copy-Item $EXE_PATH zentro.exe -Force
              Write-Host "Creating zentro.zip..."
              Compress-Archive -Path zentro.exe -DestinationPath zentro.zip -Force
              
              $zipFile = Get-Item zentro.zip
              Write-Host "Zip created. Size: $($zipFile.Length) bytes"
              if ($zipFile.Length -lt 100) {
                  Write-Error "Created zip file is suspiciously small or empty."
                  exit 1
              }
          } else {
              Write-Error "Executable not found at $EXE_PATH"
              # List files to helps debug
              ls
              exit 1
          }

      - name: Upload unsigned artifact to GitHub
        if: matrix.os == 'windows-latest'
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifact
          path: zentro.zip
          retention-days: 1

      - name: Submit and download signing request (REST API)
        if: matrix.os == 'windows-latest'
        id: sign_request
        shell: pwsh
        env:
          API_TOKEN: ${{ secrets.SIGNPATH_ORG_TOKEN }}
          ORG_ID: "d111c10f-ab29-4683-81c9-037cd5311726"
        run: |
          $headers = @{ "Authorization" = "Bearer $env:API_TOKEN" }
          
          Write-Host "Submitting signing request..."
          $uri = "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/SubmitWithArtifact"
          $form = @{
              projectSlug = "Zentro"
              signingPolicySlug = "github-ci"
              artifactConfigurationSlug = "initial"
              artifact = Get-Item "zentro.zip"
          }
          Write-Host "Artifact to upload: $($form.artifact.FullName) ($($form.artifact.Length) bytes)"
          
          # 1. Submit
          $responseHeaders = $null
          try {
              $response = Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Form $form -ResponseHeadersVariable responseHeaders
              $requestId = $response.id
              
              # Nếu body không có ID, lấy từ header Location
              if (-not $requestId -and $responseHeaders.Location) {
                  $requestId = ($responseHeaders.Location -split '/')[-1]
              }
          } catch {
              Write-Host "Submission failed!"
              if ($_.Exception.Response) {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorBody = $reader.ReadToEnd()
                  Write-Host "Error Body: $errorBody"
              }
              Write-Error $_
              exit 1
          }
          
          if (-not $requestId) {
              Write-Error "Could not retrieve Signing Request ID."
              exit 1
          }
          Write-Host "Request submitted successfully. ID: $requestId"
          
          # 2. Poll for completion
          $status = "InProgress"
          while ($status -eq "InProgress" -or $status -eq "Queued" -or $status -eq "Submitted") {
              Start-Sleep -Seconds 20
              $statusResponse = Invoke-RestMethod -Uri "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId" -Method Get -Headers $headers
              $status = $statusResponse.status
              Write-Host "Current status: $status"
          }
          
          if ($status -ne "Completed") {
              Write-Error "Signing failed with status: $status"
              exit 1
          }
          
          # 3. Download (Using curl.exe for better binary handling)
          Write-Host "Signing completed. Downloading signed artifact..."
          New-Item -ItemType Directory -Force -Path signed-artifact
          
          # Use curl.exe instead of Invoke-WebRequest to ensure binary integrity
          curl.exe -H "Authorization: Bearer $env:API_TOKEN" `
              -L -o "signed-artifact/signed.zip" `
              "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId/SignedArtifact"
          
          # 4. Extract and Hash
          Expand-Archive -Path "signed-artifact/signed.zip" -DestinationPath "signed-artifact" -Force
          $finalExe = "signed-artifact/zentro.exe"
          if (Test-Path $finalExe) {
              $hash = (Get-FileHash -Path $finalExe -Algorithm SHA256).Hash
              Write-Host "FINAL SIGNED FILE SHA256: $hash"
          }
          Write-Host "Artifact downloaded and integrity hash printed."

      - name: Verify and Extract signed artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $TARGET_FILE = "zentro-v$VERSION-windows-amd64.exe"
          
          # 1. Check original file signature (should be NotSigned)
          Write-Host "Checking original file signature..."
          (Get-AuthenticodeSignature $TARGET_FILE).Status
          
          # 2. Extract signed file
          if (Test-Path "signed-artifact/zentro.exe") {
              $signedSize = (Get-Item "signed-artifact/zentro.exe").Length
              Write-Host "Signed file found. Size: $signedSize bytes"
              
              Copy-Item "signed-artifact/zentro.exe" $TARGET_FILE -Force
              Write-Host "Overwrote original file with signed version."
          } else {
              Write-Error "Signed zentro.exe not found in extraction directory!"
              ls signed-artifact -Recurse
              exit 1
          }
          
          # 3. Final Verification
          Write-Host "Verifying final signature..."
          $sig = Get-AuthenticodeSignature $TARGET_FILE
          Write-Host "Signature Status: $($sig.Status)"
          Write-Host "Subject: $($sig.SignerCertificate.Subject)"
          
          if ($sig.Status -eq "NotSigned") {
              Write-Error "CRITICAL: Final executable is NOT SIGNED!"
              exit 1
          }
          
          if ($sig.Status -ne "Valid") {
              Write-Warning "Signature status is $($sig.Status). This is common for test certificates that are not in the trusted root store of the runner."
          }
          
          Write-Host "Digital signature applied successfully (Subject: $($sig.SignerCertificate.Subject))"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.os == 'windows-latest' && format('zentro-v{0}-windows-amd64.exe', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'windows-latest' && format('zentro-v{0}-windows-amd64-setup.exe', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('zentro-v{0}-linux-amd64', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('zentro-v{0}-linux-amd64.tar.gz', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'macos-latest' && format('zentro-v{0}-macos-universal.zip', steps.get_version.outputs.version) || '' }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
