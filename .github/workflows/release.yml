name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: zentro.exe
            release_name: zentro-v${version}-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: zentro
            release_name: zentro-v${version}-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact_name: Zentro.app
            release_name: zentro-v${version}-macos-universal.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-2.9.2 # Pin version to avoid unexpected issues

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Wails Build
        shell: bash
        run: |
          # Set ldflags based on platform
          LDFLAGS="-s -w"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          
          # Wails build will automatically run npm install/build based on wails.json
          wails build -platform ${{ matrix.platform }} -ldflags "$LDFLAGS" -clean

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          # Zip the app bundle (Wails uses productName from wails.json for the .app folder)
          if [ -d "Zentro.app" ]; then
            zip -r ../../zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip Zentro.app
          elif [ -d "zentro.app" ]; then
            zip -r ../../zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip zentro.app
          fi

      - name: Rename assets (Windows/Linux)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv build/bin/zentro.exe zentro-v${VERSION}-windows-amd64.exe
          else
            mv build/bin/zentro zentro-v${VERSION}-linux-amd64
          fi

      - name: Zip for SignPath
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path zentro-v${{ steps.get_version.outputs.version }}-windows-amd64.exe -DestinationPath artifact.zip

      - name: Upload unsigned artifact to GitHub
        if: matrix.os == 'windows-latest'
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifact
          path: artifact.zip
          retention-days: 1

      - name: Submit and download signing request (REST API)
        if: matrix.os == 'windows-latest'
        id: sign_request
        shell: pwsh
        env:
          API_TOKEN: ${{ secrets.SIGNPATH_ORG_TOKEN }}
          ORG_ID: "d111c10f-ab29-4683-81c9-037cd5311726"
        run: |
          $headers = @{ "Authorization" = "Bearer $env:API_TOKEN" }
          
          Write-Host "Submitting signing request..."
          $uri = "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/SubmitWithArtifact"
          $form = @{
              projectSlug = "Zentro"
              signingPolicySlug = "github-ci"
              artifactConfigurationSlug = "initial-version"
              artifact = Get-Item "artifact.zip"
          }
          
          # 1. Submit
          $response = Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Form $form
          $requestId = $response.id
          Write-Host "Request submitted. ID: $requestId"
          
          # 2. Poll for completion
          $status = "InProgress"
          while ($status -eq "InProgress" -or $status -eq "Queued") {
              Write-Host "Waiting for signing... (Current status: $status)"
              Start-Sleep -Seconds 20
              $statusResponse = Invoke-RestMethod -Uri "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId" -Method Get -Headers $headers
              $status = $statusResponse.status
          }
          
          if ($status -ne "Completed") {
              Write-Error "Signing failed with status: $status"
              exit 1
          }
          
          # 3. Download
          Write-Host "Signing completed. Downloading signed artifact..."
          New-Item -ItemType Directory -Force -Path signed-artifact
          Invoke-WebRequest -Uri "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId/SignedArtifact" `
              -Method Get -Headers $headers -OutFile "signed-artifact/signed.zip"
          
          # 4. Extract
          Expand-Archive -Path "signed-artifact/signed.zip" -DestinationPath "signed-artifact" -Force
          Write-Host "Artifact downloaded and extracted."

      - name: Extract signed artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # The signed artifact is downloaded and extracted into the signed-artifact directory
          # We need to ensure the signed file is in the root directory for the release step
          Get-ChildItem -Path signed-artifact -Recurse -Filter *.exe | Copy-Item -Destination . -Force
          ls zentro-v${{ steps.get_version.outputs.version }}-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zentro-v${{ steps.get_version.outputs.version }}-windows-amd64.exe
            zentro-v${{ steps.get_version.outputs.version }}-linux-amd64
            zentro-v${{ steps.get_version.outputs.version }}-macos-universal.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: false
