name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: ubuntu-22.04
            platform: linux/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Wails binary
        id: cache-wails
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails
          key: ${{ runner.os }}-wails-2.11.0

      - name: Install Wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config dpkg-dev wget
          sudo wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Make packaging scripts executable
        if: matrix.os != 'windows-latest'
        shell: bash
        run: chmod +x scripts/package-macos-dmg.sh scripts/package-linux-appimage.sh scripts/package-linux-deb.sh

      - name: Wails Build
        shell: bash
        run: |
          LDFLAGS="-s -w"
          BUILD_ARGS=(-platform "${{ matrix.platform }}" -ldflags "$LDFLAGS" -clean)
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
            BUILD_ARGS=(-platform "${{ matrix.platform }}" -ldflags "$LDFLAGS" -clean -nsis)
          fi
          wails build "${BUILD_ARGS[@]}"

      - name: Package macOS installer artifacts
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          ./scripts/package-macos-dmg.sh "$VERSION" "build/bin"

      - name: Package Linux installer artifacts
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          ./scripts/package-linux-appimage.sh "$VERSION" "build/bin/zentro"
          ./scripts/package-linux-deb.sh "$VERSION" "build/bin/zentro"

      - name: Locate and rename Windows setup
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $TARGET_FILE = "zentro-v$VERSION-windows-amd64-setup.exe"

          $candidate = Get-ChildItem "build/bin" -File -Recurse |
            Where-Object { $_.Name -match '(setup|installer)' -and $_.Extension -eq '.exe' } |
            Select-Object -First 1

          if (-not $candidate) {
            Write-Error "Windows setup executable was not found under build/bin."
            Get-ChildItem "build/bin" -Recurse
            exit 1
          }

          Copy-Item $candidate.FullName $TARGET_FILE -Force
          Write-Host "Using setup artifact: $($candidate.FullName)"
          Write-Host "Release artifact: $TARGET_FILE"

      - name: Zip setup for SignPath
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $SETUP_PATH = "zentro-v$VERSION-windows-amd64-setup.exe"

          if (-not (Test-Path $SETUP_PATH)) {
            Write-Error "Setup executable not found at $SETUP_PATH"
            exit 1
          }

          Copy-Item $SETUP_PATH "zentro-setup.exe" -Force
          Compress-Archive -Path "zentro-setup.exe" -DestinationPath "zentro.zip" -Force
          $zipFile = Get-Item "zentro.zip"
          if ($zipFile.Length -lt 100) {
            Write-Error "Created zip file is suspiciously small or empty."
            exit 1
          }

      - name: Upload unsigned artifact to GitHub
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifact
          path: zentro.zip
          retention-days: 1

      - name: Submit and download signing request (REST API)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          API_TOKEN: ${{ secrets.SIGNPATH_ORG_TOKEN }}
          ORG_ID: "d111c10f-ab29-4683-81c9-037cd5311726"
        run: |
          $headers = @{ "Authorization" = "Bearer $env:API_TOKEN" }
          $uri = "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/SubmitWithArtifact"
          $form = @{
              projectSlug = "Zentro"
              signingPolicySlug = "github-ci"
              artifactConfigurationSlug = "initial"
              artifact = Get-Item "zentro.zip"
          }

          $responseHeaders = $null
          try {
              $response = Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Form $form -ResponseHeadersVariable responseHeaders
              $requestId = $response.id
              if (-not $requestId -and $responseHeaders.Location) {
                  $requestId = ($responseHeaders.Location -split '/')[-1]
              }
          } catch {
              Write-Host "Submission failed."
              if ($_.Exception.Response) {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorBody = $reader.ReadToEnd()
                  Write-Host "Error Body: $errorBody"
              }
              Write-Error $_
              exit 1
          }

          if (-not $requestId) {
              Write-Error "Could not retrieve Signing Request ID."
              exit 1
          }

          $status = "InProgress"
          while ($status -eq "InProgress" -or $status -eq "Queued" -or $status -eq "Submitted") {
              Start-Sleep -Seconds 20
              $statusResponse = Invoke-RestMethod -Uri "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId" -Method Get -Headers $headers
              $status = $statusResponse.status
              Write-Host "Current status: $status"
          }

          if ($status -ne "Completed") {
              Write-Error "Signing failed with status: $status"
              exit 1
          }

          New-Item -ItemType Directory -Force -Path signed-artifact | Out-Null
          curl.exe -H "Authorization: Bearer $env:API_TOKEN" `
              -L -o "signed-artifact/signed.zip" `
              "https://app.signpath.io/api/v1/$($env:ORG_ID)/SigningRequests/$requestId/SignedArtifact"
          Expand-Archive -Path "signed-artifact/signed.zip" -DestinationPath "signed-artifact" -Force

      - name: Verify and apply signed setup artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $TARGET_FILE = "zentro-v$VERSION-windows-amd64-setup.exe"

          $signedCandidate = Get-ChildItem "signed-artifact" -File -Recurse |
            Where-Object { $_.Extension -eq '.exe' } |
            Select-Object -First 1

          if (-not $signedCandidate) {
            Write-Error "Signed setup executable not found in signed-artifact."
            Get-ChildItem "signed-artifact" -Recurse
            exit 1
          }

          Copy-Item $signedCandidate.FullName $TARGET_FILE -Force
          $sig = Get-AuthenticodeSignature $TARGET_FILE
          Write-Host "Signature Status: $($sig.Status)"
          if ($sig.Status -eq "NotSigned") {
            Write-Error "Final setup is not signed."
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            ${{ matrix.os == 'windows-latest' && format('zentro-v{0}-windows-amd64-setup.exe', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('zentro-v{0}-linux-amd64.AppImage', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'ubuntu-22.04' && format('zentro-v{0}-linux-amd64.deb', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'macos-latest' && format('zentro-v{0}-macos-universal.dmg', steps.get_version.outputs.version) || '' }}
            ${{ matrix.os == 'macos-latest' && format('zentro-v{0}-macos-universal.zip', steps.get_version.outputs.version) || '' }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          prerelease: true
